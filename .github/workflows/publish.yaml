name: Publish

on:
  workflow_dispatch:

jobs:
  Build:
    permissions:
      contents: write

    runs-on: windows-latest

    env:
      REPO_NAME: ${{ github.repository }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Compute Next Version Tag
        shell: pwsh
        run: |
          git fetch --tags

          $latest = git tag --sort=-version:refname | Where-Object { $_ -match '^\d+\.\d+\.\d+\.\d+$' } | Select-Object -First 1

          if (-not $latest) {
              $tag = "1.0.0.0"
          } else {
              $parts = $latest.Split('.')

              if ($parts.Count -ne 4) {
                  throw "Invalid tag format: $latest"
              }

              $parts[3] = ([int]$parts[3] + 1)
              $tag = $parts -join '.'
          }

          Write-Host "Next version: $tag"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag $tag
          git push origin $tag

          "tag=$tag" | Out-File -Append -FilePath $Env:GITHUB_ENV

      - name: Checkout tag
        shell: pwsh
        run: |
          git checkout ${{ env.tag }}

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Download Dalamud Latest
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
          Expand-Archive -Force latest.zip "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore Nuget Packages
        run: dotnet restore Gatherbuddy/Gatherbuddy.csproj

      - name: Build Plugin
        run: >
          dotnet build --no-restore
          -c Release
          Gatherbuddy/Gatherbuddy.csproj
          -p:AssemblyVersion=${{ env.tag }}
          -p:FileVersion=${{ env.tag }}
          -p:PackageVersion=${{ env.tag }}
          -p:InformationalVersion=${{ env.tag }}
          --output ./build

      - name: Build raphael-cli from raphael-rs
        shell: pwsh
        run: |
          git clone https://github.com/KonaeAkira/raphael-rs.git raphael-rs-temp
          cd raphael-rs-temp
          cargo build --release --package raphael-cli

          if ($LASTEXITCODE -ne 0) {
              throw "Failed to build raphael-cli"
          }

          Copy-Item ".\target\release\raphael-cli.exe" "..\build\raphael-cli.exe" -Force

          cd ..
          Remove-Item raphael-rs-temp -Recurse -Force

      - name: Zip Plugin
        run: Compress-Archive -Path ./build/* -DestinationPath ./build/GatherbuddyReborn.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.tag }}
          name: ${{ env.tag }}
          files: ./build/GatherbuddyReborn.zip
          token: ${{ secrets.GITHUB_TOKEN }}
